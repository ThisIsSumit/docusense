name: docusense
description: AI Document Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3

  # Local Storage
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3

  # Caching
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  glassmorphism: ^3.0.0


  # File Handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3

  # Sharing
  share_plus: ^7.2.1

  # Utils
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3

  # Auth
  local_auth: ^2.2.0
  open_file_plus: ^3.4.1+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne/static/Syne-Regular.ttf
        - asset: assets/fonts/Syne/static/Syne-Medium.ttf
          weight: 500
        - asset: assets/fonts/Syne/static/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne/static/Syne-ExtraBold.ttf
          weight: 800
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrains_Mono/static/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrains_Mono/static/JetBrainsMono-Medium.ttf
          weight: 500
