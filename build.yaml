targets:
  $default:
    builders:
      riverpod_generator:
        options:
          riverpod_version: 2
      json_serializable:
        options:
          any_map: true
          checked: true
          create_factory: true
          create_to_json: true
          explicit_to_json: true
          field_rename: snake
      hive_generator:
        options:
          use_null_safety: true
